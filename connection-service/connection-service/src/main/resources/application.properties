spring.application.name=connection-service

server.servlet.context-path=/connections
server.port=9030

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Neo4j: default port 7687. Use 7690 if Neo4j Desktop uses that port.
spring.neo4j.uri=bolt://localhost:7690
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=password

# PostgreSQL for connection requests
spring.datasource.url=jdbc:postgresql://localhost:5432/connectionDb
spring.datasource.username=postgres
spring.datasource.password=Snehil@208001
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Include error message in response for debugging
server.error.include-message=always

