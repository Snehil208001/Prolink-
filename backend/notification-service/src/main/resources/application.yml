spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${spring.application.name}
      key-deserializer: org.apache.kafka.common.serialization.LongDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.snehil.prolink.post,com.snehil.prolink.post.event,com.snehil.prolink.notification_service,com.snehil.prolink.connection_service.event,com.snehil.prolink.chat_service.event"
