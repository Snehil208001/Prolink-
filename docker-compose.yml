services:
  # ============ Infrastructure ============
  postgres:
    image: postgres:16-alpine
    container_name: prolink-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: prolink123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  neo4j:
    image: neo4j:5-community
    container_name: prolink-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-a", "bolt://localhost:7687", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s

  kafka:
    image: apache/kafka:latest
    container_name: prolink-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 15
      start_period: 45s

  mongodb:
    image: mongo:7
    container_name: prolink-mongodb
    environment:
      MONGO_INITDB_DATABASE: prolink_chat
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ============ Discovery ============
  discovery-server:
    build:
      context: ./backend/discovery-server
      dockerfile: Dockerfile
    container_name: prolink-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8761 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ============ API Gateway ============
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: prolink-api-gateway
    environment:
      EUREKA_HOST: discovery-server
      POST_SERVICE_HOST: post-service
      CONNECTION_SERVICE_HOST: connection-service
      CHAT_SERVICE_HOST: chat-service
      NOTIFICATION_SERVICE_HOST: notification-service
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy

  # ============ Microservices ============
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: prolink-user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userDb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: prolink123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  post-service:
    build:
      context: ./backend/post-service
      dockerfile: Dockerfile
    container_name: prolink-post-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postDb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: prolink123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  connection-service:
    build:
      context: ./backend/connection-service
      dockerfile: Dockerfile
    container_name: prolink-connection-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/connectionDb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: prolink123
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: password
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: prolink-notification-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notificationDb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: prolink123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  chat-service:
    build:
      context: ./backend/chat-service
      dockerfile: Dockerfile
    container_name: prolink-chat-service
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/prolink_chat}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ============ Frontend ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prolink-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  neo4j_data:
  mongodb_data:
